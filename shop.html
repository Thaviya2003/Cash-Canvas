<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Collection | Cash Canvas Luxury</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/shop.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-area">
                <a href="index.html">
                    <img src="images/cashcanvaslogohorizontal.png" alt="Cash Canvas Luxury" class="main-logo">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop All</a></li>
                <li><a href="mens-collection.html">Men</a></li>
                <li><a href="womens-collection.html">Women</a></li>
                <li><a href="home-decor.html">Decor</a></li>
            </ul>
            <div class="nav-icons">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-bag-shopping"></i>
            </div>
        </div>
    </nav>

    <main class="shop-container">
        <aside class="filter-sidebar">
            <h2 class="serif-title">Filters</h2>
            <div class="filter-group">
                <h4>Category</h4>
                <ul>
                    <li><input type="checkbox" id="watches"> <label for="watches">Timepieces</label></li>
                    <li><input type="checkbox" id="bags"> <label for="bags">Handbags</label></li>
                    <li><input type="checkbox" id="jewelry"> <label for="jewelry">Fine Jewelry</label></li>
                    <li><input type="checkbox" id="decor"> <label for="decor">Gilded Decor</label></li>
                </ul>
            </div>
            <div class="filter-group">
                <h4>Price Range</h4>
                <input type="range" min="500" max="50000" step="500" class="price-slider">
                <div class="price-labels">
                    <span>$500</span>
                    <span>$50k+</span>
                </div>
            </div>
        </aside>

        <section class="product-area">
            <div class="shop-header">
                <p>Showing 12 exquisite pieces</p>
                <select class="sort-dropdown">
                    <option>Sort by: Newest</option>
                    <option>Price: High to Low</option>
                    <option>Price: Low to High</option>
                </select>
            </div>

            <div class="product-grid">
                <div class="product-card">
                    <div class="product-img">
                        <img src="https://media.gq.com/photos/675a6fdbdeb4f1b45834607f/master/w_1600%2Cc_limit/GQ-RolexesRanked-04.jpg" alt="Luxury Watch">
                        <button class="add-to-cart-btn"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div class="product-info">
                        <span class="category-label">Timepiece</span>
                        <h3>Legacy Chronograph</h3>
                        <p class="price">$12,400</p>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-img">
                        <img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?auto=format&fit=crop&q=80&w=800" alt="Quilted Purse">
                        <button class="add-to-cart-btn"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div class="product-info">
                        <span class="category-label">Handbag</span>
                        <h3>Onyx Quilted Purse</h3>
                        <p class="price">$3,200</p>
                    </div>
                </div>

                <div class="product-card">
                    <div class="product-img">
                        <img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?auto=format&fit=crop&q=80&w=800" alt="Gilded Vase">
                        <button class="add-to-cart-btn"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div class="product-info">
                        <span class="category-label">Home Decor</span>
                        <h3>Gilded Azure Vase</h3>
                        <p class="price">$1,850</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
